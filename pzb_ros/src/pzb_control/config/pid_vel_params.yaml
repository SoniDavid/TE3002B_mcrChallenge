odometry_node:
  ros__parameters:
    use_sim_time: false
    publish_tf: true
    odom_frame: odom
    base_frame: base_link
    odom_pose_covariance: 0.01
    odom_twist_covariance: 0.01

velocity_controller:
  ros__parameters:
    use_sim_time: false
    kp_v: 0.5
    ki_v: 0.1
    kd_v: 0.0
    kp_w: 0.5
    ki_w: 0.0
    kd_w: 0.0
    integral_clamp: 0.2
    loop_hz: 50.0
    max_linear_speed: 0.40
    max_angular_speed: 1.50
    cmd_timeout_s: 0.50
    deadzone_comp_v: 0.0   # snap small linear commands up to this threshold (m/s); 0 = disabled
    deadzone_comp_w: 0.0   # snap small angular commands up to this threshold (rad/s); 0 = disabled
    robot_vel_stale_timeout_s: 0.10  # if /robot_vel is older than this, publish zero /cmd_vel
    min_dt_s: 0.005                 # reject too-small control dt to avoid transient spikes
    hold_zero_until_feedback: true  # keep /cmd_vel=0 until first /robot_vel sample arrives
    diag_period_s: 5.0              # emit periodic safety counters for debugging

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    Kp_dist: 1.0
    Kp_yaw: 1.2
    Ki_yaw: 0.0

    # Angle parameters — specified in DEGREES, converted to radians internally
    yaw_tol_deg: 2.0              # heading tolerance to exit ALIGNING
    decel_zone_deg: 30.0          # start ramping ω down this many degrees before target
    yaw_integral_clamp_deg: 30.0  # anti-windup clamp on yaw integral

    # Motor deadband: omega commands below this (rad/s) are zeroed to prevent
    # the wheel PID from hunting at the MCU deadzone boundary (~0.054 rad/s).
    omega_deadband_rad_s: 0.08

    dist_tol_m: 0.05
    max_linear_speed: 0.40
    max_angular_speed: 0.8
    min_linear_speed: 0.05
    blend_radius_m: 0.40          # start blending toward goal heading (meters from waypoint)
    align_yaw: false
    align_at_all_waypoints: false
    lookahead_dist: 0.10
    loop_hz: 20.0

    # Waypoints: flat list [x0, y0, yaw0_deg, x1, y1, yaw1_deg, ...]
    # Yaw values are in DEGREES
    waypoints_xyyaw: [
      0.0,  0.0,    0.0,
      0.5,  0.0,    0.0,
      0.5,  0.5,   90.0,
      0.0,  0.5,  180.0,
      0.0,  0.0,  -90.0,
      0.0,  0.0,    0.0
    ]

    # --- Example paths (yaw in degrees) ---
    # Simple L-shape:
    # waypoints_xyyaw: [0.8, 0.0, 0.0,   0.8, 0.8, 90.0]

    # Octagon:
    # waypoints_xyyaw: [
    #    0.354,  0.146,   45.0,
    #    0.500,  0.500,   90.0,
    #    0.354,  0.854,  135.0,
    #    0.000,  1.000,  180.0,
    #   -0.354,  0.854, -135.0,
    #   -0.500,  0.500,  -90.0,
    #   -0.354,  0.146,  -45.0,
    #    0.000,  0.000,    0.0
    # ]


