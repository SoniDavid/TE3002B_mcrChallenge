odometry_node:
  ros__parameters:
    use_sim_time: false
    publish_tf: true
    odom_frame: odom
    base_frame: base_link
    odom_pose_covariance: 0.01
    odom_twist_covariance: 0.01

velocity_controller:
  ros__parameters:
    use_sim_time: false
    kp_v: 0.5
    ki_v: 0.1
    kd_v: 0.0
    kp_w: 0.8
    ki_w: 0.1
    kd_w: 0.0
    integral_clamp: 0.2
    loop_hz: 50.0
    max_linear_speed: 0.40
    max_angular_speed: 1.50
    cmd_timeout_s: 0.50
    deadzone_comp_v: 0.0   # snap small linear commands up to this threshold (m/s); 0 = disabled
    deadzone_comp_w: 0.0   # snap small angular commands up to this threshold (rad/s); 0 = disabled

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    Kp_dist: 1.0
    Kp_yaw: 2.0
    dist_tol_m: 0.05
    yaw_tol_rad: 0.05
    max_linear_speed: 0.20
    max_angular_speed: 1.20
    min_linear_speed: 0.05  # dead zone — below this speed command 0 to prevent creep
    align_yaw: false      # rotate to target yaw only at the final waypoint
    lookahead_dist: 0.2  # advance to next waypoint this far early — keeps motion continuous
    loop_hz: 20.0
    # Waypoints: flat list [x0, y0, yaw0, x1, y1, yaw1, ...]
    waypoints_xyyaw: [
      0.5,  0.0,  0.0,
      0.5,  0.5,  1.5708,
      0.0,  0.5,  3.1416,
      0.0,  0.0, -1.5708
    ]

