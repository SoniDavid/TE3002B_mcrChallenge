color_detector_node:
  ros__parameters:
    use_sim_time: false

    # --- HSV ranges (OpenCV: H in [0,180], S and V in [0,255]) ---
    # Red wraps around H=0/180, so two sub-ranges are needed.
    red_h_low1:  0       # lower red range lower bound
    red_h_high1: 10      # lower red range upper bound
    red_h_low2:  165     # upper red range lower bound
    red_h_high2: 180     # upper red range upper bound
    red_s_min:   100
    red_v_min:   80

    green_h_low:  45
    green_h_high: 85
    green_s_min:  80
    green_v_min:  80

    yellow_h_low:  18
    yellow_h_high: 35
    yellow_s_min:  120
    yellow_v_min:  100

    # --- Detection robustness ---
    min_blob_area:   800.0   # px² — blobs smaller than this are ignored
    confirm_frames:  3       # consecutive frames of same color before updating output
    loop_hz:         30.0

traffic_light_fsm_node:
  ros__parameters:
    use_sim_time: false

    yellow_speed_scale:     0.4   # initial v multiplier when yellow first seen
    yellow_ramp_duration_s: 3.0   # s — ramp from yellow_speed_scale → 0.0 while yellow persists
    color_lost_timeout:     1.5   # s — treat color as "none" if no detection this long
    loop_hz:                20.0
