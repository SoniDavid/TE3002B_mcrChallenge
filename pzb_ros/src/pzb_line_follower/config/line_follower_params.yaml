line_follower_node:
  ros__parameters:
    # Input image size (detector expects 320x240)
    image_width:  320
    image_height: 240

    # Proportional steering gain (rad/s per pixel of error)
    # Raised 0.0035->0.0045 (adaptive_new fix): medium curves were under-steered
    # (50 px x 0.0035 = 0.175, too weak — the line drifted off). 0.0045 gives ~0.23 at
    # 50 px / ~0.36 at 80 px, a real correction. Small errors stay gentle (dead_band +
    # the output slew still damp the <20 px jitter, so this doesn't reintroduce stutter).
    Kp_angular: 0.0045

    # Derivative steering gain (rad/s per pixel/frame of error rate)
    # DISABLED (10-attempt anti-stutter fix): at ~7 fps the cx target jumps frame to
    # frame on this multi-line/jigsaw-seam track; the D-term amplified each jump into a
    # steering slam (a -58 px one-frame error → +0.64 rad/s, observed az=+0.8 at only
    # 58 px error) and drove the 4-8/s sign-flips. Smoothing is now done by the output
    # angular EMA + error median filter below instead.
    Kd_angular: 0.0

    # Pixel dead band around image center — no steering correction within this range.
    # Widened 8→12 (anti-stutter): small centering noise around the line no longer
    # produces constant micro-corrections.
    dead_band_px: 12

    # ── Anti-stutter steering smoothing ───────────────────────────────────────────
    # error_median_n: median-filter the steering error over N detector frames so one
    #   cx-teleport frame can't swing the command; a sustained turn still gets through.
    # angular_smooth_alpha: LEGACY (output EMA) — superseded by angular_slew_max below.
    #   The EMA lagged a sustained curve ramp (caused understeer); the slew-rate limit
    #   bounds reversals without that lag. Kept declared for backward-compat; unused.
    # Lowered 3→2 (yolo-bags actual-fps fix): the median window was sized for a "~7 fps"
    # camera, but the follower now runs 16-27 fps — a 3-frame window added ~100-130 ms of
    # lag to the error the PD acts on, flattening the curve's error rise so turns didn't
    # register (impl3 turn 0/1→1/1, impl4 6/7→7/7 in offline replay; straight az
    # sign-flips stayed ~0). 2 still rejects a single cx-teleport frame.
    error_median_n: 2
    angular_smooth_alpha: 0.4

    # ── Curve handling + steering rate-limit (new-bags curve-understeer fix) ──────
    # curve_min_speed: speed floor when only ONE line is visible or |error| is large —
    #   a sharp curve looks like that and is NORMAL; flooring to sharp_turn_speed made
    #   the robot crawl and fall behind. Keep it advancing so the line stays in frame.
    # angular_slew_max: max change in commanded angular.z per detector frame (rad/s).
    #   Caps single-frame reversals (anti-stutter) WITHOUT lagging a steady same-sign
    #   ramp on a real curve. Lower = smoother but slower to commit; 0 disables.
    # steer_hysteresis_px: once steering commits to a side, the error must exceed this
    #   on the opposite side before the command may reverse — kills center jitter.
    curve_min_speed: 0.05
    # Raised 0.12→0.20 (yolo-bags actual-fps fix): at the now-higher 16-27 fps the gentle
    # 0.12/frame cap took too many frames to build steering on a medium (non-"sharp")
    # curve, so the line drifted off before the command ramped. 0.20 lets medium curves
    # commit faster; the downstream twist_slew_limiter (max_angular_accel=4.0) is still the
    # real smoother and single-frame reversals stay bounded (anti-stutter).
    angular_slew_max: 0.20
    steer_hysteresis_px: 6
    # Sharp-turn slew bypass: on a genuine sharp turn (|error| >= slew_bypass_error_px
    # AND consistent sign — not small-error jitter) steering ramps at the larger
    # angular_slew_max_sharp so it reaches the PD value in 1-2 frames instead of ~5.
    # Fixes the robot driving PAST tight curves; cannot reintroduce stutter (which is
    # small-error sign-flipping, excluded by the same-sign gate). The median error filter
    # is also bypassed on a sharp turn so it doesn't lag the fast error rise.
    # Lowered 80->50 (adaptive_new fix): a DEAD-ZONE existed for medium curves (|err|
    # 40-80 px) — below the old 80 threshold they got the gentle slew (az throttled to
    # ~0.18) and under-steered, so the line slowly drifted off (adaptive_new6 held err
    # -50 for ~4s then lost the line). Error distribution: ~55-68% of frames <20px
    # (straights), only ~10-15% >50px (curves), so 50 cleanly separates curves from the
    # small-error jitter the slew damps. At >=50px + consistent sign the node now passes
    # full PD to the downstream slew node (which ramps fast at max_angular_accel=4.0).
    # Lowered 50→40 (yolo-bags actual-fps fix): paired with the looser lane-center damping
    # (which lets the curve's error actually rise), 40 recognizes the turn ~1 frame earlier
    # so the fast steering ramp engages before the line leaves the squashed ROI. Still well
    # above the small-error jitter band (dead_band 12 + hysteresis 6), so no stutter.
    slew_bypass_error_px: 40

    # ── Medium-curve gain boost (B1, new_implementation1 under-steer fix) ──────────
    # Kp=0.0045 gave err 70 -> az only 0.32, so medium curves (|err| 50-110) under-steered
    # and the error lingered 2-5 s (t=89.8/153.1/168.3). On a CONFIRMED turn (sharp_turn:
    # sustained same-sign |err| >= slew_bypass_error_px) multiply Kp by curve_gain. Offline:
    # raises peak az per turn ~0.32 -> ~0.49 (1.5x) with straight sign-flips unchanged.
    # Gated on sharp_turn so it never amplifies small-error jitter into stutter.
    curve_gain: 1.5

    # ── Open-loop "turn until aligned" latch (B2) — OPT-IN, default OFF ────────────
    # On a confirmed turn, rotate a fixed yaw toward the line at reduced speed and HOLD
    # until the CAMERA says re-centered (|err| < exit for exit_frames) or max_s elapses.
    # More decisive than PD on tight curves but open-loop — the offline harness CANNOT
    # validate closed-loop steering, so enable + tune this only via on-robot A/B vs B1
    # (B1's gain boost is the default and likely sufficient). Offline it added some az
    # sign-flips (latch toggling near thresholds), so treat thresholds carefully on-robot.
    turn_latch_enabled:     false
    turn_latch_error_px:    55    # enter: |err| >= this (same sign) for turn_latch_frames
    turn_latch_frames:      3
    turn_latch_z:           0.55  # held yaw rate (rad/s) toward the line while latched
    turn_latch_exit_px:     25    # exit: |err| < this (camera re-centered) for exit_frames
    turn_latch_exit_frames: 3
    turn_latch_max_s:       2.5   # safety cap: force-exit after this long
    turn_latch_speed:       0.05  # linear speed (m/s) while turning in place-ish

    # ── YOLO dashed-gated turn signs (Part 2) ─────────────────────────────────────
    # At a CONFIRMED dashed crossing the robot consumes the most-recent /yolo/sign turn
    # class: letRecto = cross straight (existing behavior); letDerecha/letIzquierda =
    # open-loop turn arc INTO that lane, then re-acquire and resume centered following.
    # Non-turn (slow) classes are handled by the traffic FSM, not here. The sign must be
    # fresh (seen within turn_sign_stale_s) so an old detection can't fire at the wrong
    # crossing. cross_turn_z/s tuned for ~90° + margin: 0.6 rad/s × 2.9 s ≈ 1.74 rad ≈ 100°
    # so the robot comes fully around the right-angle elbow before re-acquiring.
    turn_sign_left_class:     letIzquierda
    turn_sign_right_class:    letDerecha
    turn_sign_straight_class: letRecto
    turn_sign_stale_s:        4.0   # ignore a latched sign older than this
    cross_turn_z:             0.6   # yaw rate (rad/s) during the lane turn
    cross_turn_s:             2.9   # turn duration (s) — ~90°+margin at cross_turn_z (was 1.6 ≈ 55°, too short)
    cross_turn_speed:         0.06  # forward speed (m/s) during the turn
    # YOLO turn arrow → turn AT the dashed crossing. The arrow (on its OWN /yolo/turn_sign
    # channel, so a nearer GIVE WAY/construccion/stopSign can't mask it) latches a
    # DIRECTION; the open-loop turn-into-lane fires in the dashed-crossing FSM once the
    # robot is aligned at the crossing — i.e. "turn AFTER the dashed lines". letRecto / no
    # arrow → cross straight. One crossing = one turn (Phase C consumes the arrow), so
    # re-seeing the same sign without a new crossing can't re-fire (the run4 double-fire
    # bug). turn_sign_min_area_frac is a small freshness FLOOR (0=off), NOT the trigger.
    # The autonomous run bags showed the arrow is seen 0-1.7s before the real turn
    # crossings (well within turn_sign_stale_s=4.0) and stale at straight crossings.
    turn_sign_only_enabled:   true
    turn_sign_topic:          /yolo/turn_sign
    turn_sign_min_area_frac:  0.0    # freshness floor only (0=off); NOT the trigger
    turn_sign_rearm_gap_s:    1.0    # (legacy) re-arm window; one-per-crossing is the real guard
    angular_slew_max_sharp: 0.45
    # Curve dashed-suppression: ignore a "dashed" classification while |steering error|
    # exceeds this — a real crossing is approached head-on (small error) while a sharp
    # curve (large error) breaks the line into co-linear blobs that falsely read as a
    # dash row and zero steering mid-curve (robot drives off the bend). Measured: real
    # crossings at |err| 10-33 px, false-on-curve at 48-129 px → 45 cleanly separates.
    dashed_suppress_error_px: 45
    # Tight-turn speed drop: above this |error| (px) the curve is too tight to take at
    # curve speed (line hit the ROI edge before the robot rounded it) — drop to
    # sharp_turn_speed for turn-radius headroom. Above sharp_turn_threshold (80) so
    # ordinary bends keep curve_min_speed and don't crawl. Paired with the fast steering
    # ramp (downstream max_angular_accel raised to 4.0) so the robot turns hard AND slow
    # only on the tightest curves.
    tight_turn_error_px: 110
    # Error-driven early braking (opt-bags turn-overshoot fix): the curve slowdown used
    # to couple speed to the SLEW-LIMITED angular.z, which lags the turn — at turn entry
    # |error| is already large but angular.z is still ramping, so the robot stayed near
    # full speed exactly when it should brake and the line swept off the squashed ROI
    # before it could round the bend (opt5 t≈15: error 4→159, cx pinned at 319 in ~0.1s).
    # The node now also brakes off the IMMEDIATE |error|: speed scales down from full at
    # |error|<=dead_band to the full curve_speed_reduction at curve_brake_error_px, so it
    # slows the instant a turn is SEEN. Lower = brakes harder/earlier on gentler curves.
    curve_brake_error_px: 90
    # Stale-frame safety: the camera runs at a poor, variable 4.7-9.5 fps with stalls up
    # to 1.4 s. If no new frame arrives for frame_stale_s the 20 Hz publisher scales the
    # linear speed by stale_speed_scale (steering held) so the robot doesn't drive blind
    # off a curve, resuming when a fresh frame lands. stale_speed_scale=0 = pause-while-
    # blind; raise toward 0.3 to keep creeping. 0 frame_stale_s disables. NOTE: this is a
    # mitigation — the real fix for the low fps is on the camera/undistort/compute side.
    frame_stale_s: 0.4
    stale_speed_scale: 0.0

    # ── Error-saturation junction guard ───────────────────────────────────────────
    # If |error| stays ≥ error_sat_px for error_sat_frames consecutive solid frames the
    # detector has pinned cx at an edge (lost the real line at a junction) — route to
    # search-then-stop instead of crawling into the wall. Conservative: a genuine sharp
    # curve converges within ~1 s (< error_sat_frames at ~7 fps) so it never trips this.
    error_sat_px: 150
    error_sat_frames: 6

    # ── Search-then-stop loss recovery ────────────────────────────────────────────
    # On line loss (or sustained error-saturation), steer toward the last-seen side at
    # search_speed_mps for up to search_timeout_s to bring the line back into view, then
    # STOP. Never reverse, and search_angular_z is capped so it can't whip out of bounds.
    search_timeout_s: 1.2
    search_speed_mps: 0.04
    search_angular_z: 0.25
    # Non-terminal rotate-until-found recovery (opt-bags stale fix). After the Phase-1
    # forward creep (search_timeout_s) the robot rotates IN PLACE (linear=0, never drives
    # into a wall) toward the last-seen side, reversing every search_sweep_s so it scans
    # both sides, and KEEPS doing it until a line is re-acquired — no permanent stop (the
    # old search-then-STOP left opt6/7/8 stale forever). search_rotate_z = capped yaw.
    search_rotate_z: 0.30
    search_sweep_s:  2.0
    # Blind-stall full stop: frame_stale_s holds steering through a brief frame drop, but a
    # multi-second camera FREEZE (opt6-9: both streams hang 3-9 s) would let the recovery
    # rotation spin the robot blind. Past frame_blind_s with no fresh frame, publish (0,0);
    # the sweep resumes the instant frames return. Keep > frame_stale_s.
    frame_blind_s: 1.0

    # Forward speed in m/s (desired; curve reduction may reduce this).
    # Lowered 0.10->0.06 (opt-bags turn fix): faster cruise outran the squashed-ROI
    # look-ahead and the line swept off the ROI edge before the robot rounded sharp
    # turns (opt4/opt5 out of bounds). The launch file also defaults this to 0.06.
    linear_speed: 0.06

    # Hard cap on linear output in m/s (also enforced by twist_slew_limiter)
    max_linear_speed: 0.20

    # Maximum angular velocity output (rad/s)
    max_angular: 0.8

    # Speed reduction on curves: 0.0 = constant speed, 1.0 = stop at max angular
    # Mirrors the cos(alpha) factor in waypoint_follower — start at 0.5
    curve_speed_reduction: 0.5

    # Minimum linear speed in m/s — prevents stalling mid-curve (keep above motor deadband ~0.04)
    min_linear_speed: 0.05

    # Consecutive dashed frames required before confirming dashed line type.
    # Prevents a single bad frame during a turn from triggering a false dashed detection.
    dashed_confirm_frames: 3

    # Seconds to coast using last PD command after dashed is first confirmed.
    # Closes the camera look-ahead gap before open-loop advance begins.
    dashed_coast_s: 1.5

    # Open-loop advance after dashed: drive STRAIGHT across the intersection for
    # openloop_dist_m of track, then stop. The crossing speed now MATCHES the
    # robot's approach (cruise) speed so there is no velocity jump (bad_alginment
    # fix) — openloop_speed_mps is only a FALLBACK if the approach speed is invalid.
    openloop_speed_mps: 0.15    # fallback crossing speed only
    openloop_dist_m:    0.50

    # During the dashed crossing the robot drives straight (angular.z=0) and
    # re-acquires the 3 lines on the far side. The legacy side-aware boundary
    # recovery (which produced visible mid-crossing turns) is OFF by default;
    # set true to re-enable it (uses recovery_angular_z below).
    dashed_recovery_enabled: false
    recovery_angular_z: 0.30    # only used if dashed_recovery_enabled: true

    # Single-frame error-jump clamp (bad_alginment fix): if the steering error
    # jumps more than this many px in ONE frame (a cx teleport onto a crossing
    # dash / outermost line near an intersection), reject it for one frame so the
    # PD doesn't slam the steering. A real sharp turn persists and is accepted on
    # the next frame. Set 0 to disable.
    max_error_jump_px: 60

    # Perpendicular dashed-alignment (bad_alginment2 fix): before crossing, rotate
    # the robot to be perpendicular to the dashes using the median dash-slope (the
    # detector fits it from dash candidates only, so it's a clean signal). This is
    # essential for future intersection actions beyond going straight.
    #   enabled        — master switch
    #   deadband_deg   — within this tilt the robot is "perpendicular enough" (no steer)
    #   k_align_z      — rad/s per degree of tilt (P gain; raise for faster squaring)
    #   align_max_z    — cap on alignment angular.z
    #   align_sign     — +1/-1 rotation direction; FLIP if it aligns the wrong way
    #   median_n       — number of valid slope samples to median-filter (noise reject)
    #   align_timeout_s— (legacy) max time spent aligning before crossing anyway
    # Strong safeguards (bad_ignment4 fix) — alignment was firing on an already-
    # straight robot from a degraded end-of-crossing slope reading (+32° when the
    # truth was +1–2°), rotating it off the straight lines it should have followed:
    #   align_window_s    — only correct in this early window after dashed entry;
    #                       after it, cross straight (the dash row degrades as the
    #                       robot overlaps it). An in-deadband reading latches
    #                       "aligned" immediately and never re-steers.
    #   align_max_tilt_deg— reject slope frames implying a larger tilt than this as
    #                       physically implausible garbage (don't feed the median).
    # ENABLED (re-enabled per on-robot review): square up perpendicular to the dash row
    # before crossing/turning, so the YOLO turn action starts from a known heading. The
    # robot aligns within align_window_s, then the YOLO sign decides straight vs turn.
    dashed_align_enabled: true
    align_deadband_deg:   6.0
    k_align_z:            0.015
    align_max_z:          0.30
    align_sign:           1
    align_slope_median_n: 5
    align_timeout_s:      1.2
    align_window_s:       2.0
    align_max_tilt_deg:   35.0

    # Seconds to delay full angular output after a sharp turn first appears in the image.
    # The camera looks ~15 cm ahead of the wheel axle; this gives the body time to arrive
    # at the turn before committing to max steering. Tune: 0.1–0.25 s on hardware.
    turn_approach_delay_s: 0.15

    # Post-intersection acquisition guard (bag8 Section-1 fix): for this many
    # seconds after a dashed→solid exit, the tracker anchors are re-seeded to
    # image center and angular output is capped (like turn_approach_delay) so the
    # robot can't pivot ~90° onto a leftover crossing dash before settling.
    acquire_guard_s: 0.4

    # Stuck-lock watchdog (bag8 Section-2 fix): if the tracked error stays frozen
    # far off-center for stuck_lock_s, the robot is "following" a stationary
    # non-line (wall / floor-panel seam) — declare the line lost so it coasts then
    # stops instead of rotating into the obstacle.
    #   band: |error| above this (px) counts as off-center
    #   var:  error spread (max-min, px) below this counts as frozen
    # Conservative defaults: a real curve's error changes as the robot rotates
    # and resolves within ~1 s, so a TRULY frozen error for 2.5 s with <4 px of
    # movement is a stationary lock (wall/seam), not a curve. Tighten from real
    # bag data: if a genuine curve ever trips it, raise stuck_lock_s; if a wall is
    # chased too long before stopping, lower it.
    stuck_lock_s:       2.5
    stuck_lock_band_px: 20
    stuck_lock_var_px:  4

    # Publish pipeline debug visualization on /line_follower/debug_image.
    # OFF by default: the 7-tile image is ~0.5 MB/frame; building + publishing (and
    # especially RECORDING) it on the Jetson caused multi-second whole-graph stalls
    # (new_implementation1: 22 s freeze, 1.9 GB of debug frames). Enable ONLY for a
    # tuning session, and prefer recording it on the laptop, not the robot.
    # (The launch file's publish_debug arg also defaults false and overrides this.)
    publish_debug: false

    # Loss coasting: when all 3 line slots are lost, hold last command at reduced speed
    # for up to lost_timeout_s before stopping (Team2 pattern: lost_timeout_s=0.3)
    lost_timeout_s:   0.35
    lost_speed_scale: 0.50

    # Sharp-turn override: when |error| exceeds threshold the speed is floored — but at
    # curve_min_speed (above), NOT the much slower sharp_turn_speed, so the robot keeps
    # advancing through a real bend instead of crawling and falling behind (curve fix).
    # sharp_turn_speed is now only the absolute floor; curve_min_speed dominates on curves.
    # Threshold raised 60→80 so a moderate curve error doesn't trip the slowest regime.
    # Lowered 80→60 again (opt-bags turn fix) so the hard curve-speed floor engages
    # earlier, now backed by error-driven early braking (curve_brake_error_px) so the
    # robot is already slowing before this floor. The launch file also defaults to 60.
    sharp_turn_threshold_px: 60
    sharp_turn_speed: 0.03

    # Input and output topic names
    # topic_cmd_vel feeds twist_slew_limiter; slew limiter outputs to /cmd_vel_desired
    topic_image_in: /camera/image_raw
    topic_cmd_vel:  /cmd_vel_desired_raw
