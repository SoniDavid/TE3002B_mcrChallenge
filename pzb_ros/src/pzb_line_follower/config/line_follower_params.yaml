line_follower_node:
  ros__parameters:
    # Input image size (detector expects 320x240)
    image_width:  320
    image_height: 240

    # Proportional steering gain (rad/s per pixel of error)
    # Increase to react more aggressively to line offset
    Kp_angular: 0.0035

    # Derivative steering gain (rad/s per pixel/frame of error rate)
    # DISABLED (10-attempt anti-stutter fix): at ~7 fps the cx target jumps frame to
    # frame on this multi-line/jigsaw-seam track; the D-term amplified each jump into a
    # steering slam (a -58 px one-frame error → +0.64 rad/s, observed az=+0.8 at only
    # 58 px error) and drove the 4-8/s sign-flips. Smoothing is now done by the output
    # angular EMA + error median filter below instead.
    Kd_angular: 0.0

    # Pixel dead band around image center — no steering correction within this range.
    # Widened 8→12 (anti-stutter): small centering noise around the line no longer
    # produces constant micro-corrections.
    dead_band_px: 12

    # ── Anti-stutter steering smoothing (10-attempt fix) ──────────────────────────
    # angular_smooth_alpha: EMA weight on the COMMANDED angular.z (0=frozen, 1=no
    #   smoothing). ~0.4 keeps responsiveness while killing single-frame reversals.
    # error_median_n: median-filter the steering error over N detector frames so one
    #   cx-teleport frame can't swing the command; a sustained turn still gets through.
    angular_smooth_alpha: 0.4
    error_median_n: 3

    # ── Search-then-stop loss recovery (10-attempt fix) ───────────────────────────
    # On line loss, steer toward the last-seen side at search_speed_mps for up to
    # search_timeout_s to bring the line back into view, then STOP. Never reverse,
    # and search_angular_z is capped so the robot can't whip out of bounds.
    search_timeout_s: 1.2
    search_speed_mps: 0.04
    search_angular_z: 0.25

    # Forward speed in m/s (desired; curve reduction may reduce this)
    linear_speed: 0.10

    # Hard cap on linear output in m/s (also enforced by twist_slew_limiter)
    max_linear_speed: 0.20

    # Maximum angular velocity output (rad/s)
    max_angular: 0.8

    # Speed reduction on curves: 0.0 = constant speed, 1.0 = stop at max angular
    # Mirrors the cos(alpha) factor in waypoint_follower — start at 0.5
    curve_speed_reduction: 0.5

    # Minimum linear speed in m/s — prevents stalling mid-curve (keep above motor deadband ~0.04)
    min_linear_speed: 0.05

    # Consecutive dashed frames required before confirming dashed line type.
    # Prevents a single bad frame during a turn from triggering a false dashed detection.
    dashed_confirm_frames: 3

    # Seconds to coast using last PD command after dashed is first confirmed.
    # Closes the camera look-ahead gap before open-loop advance begins.
    dashed_coast_s: 1.5

    # Open-loop advance after dashed: drive STRAIGHT across the intersection for
    # openloop_dist_m of track, then stop. The crossing speed now MATCHES the
    # robot's approach (cruise) speed so there is no velocity jump (bad_alginment
    # fix) — openloop_speed_mps is only a FALLBACK if the approach speed is invalid.
    openloop_speed_mps: 0.15    # fallback crossing speed only
    openloop_dist_m:    0.50

    # During the dashed crossing the robot drives straight (angular.z=0) and
    # re-acquires the 3 lines on the far side. The legacy side-aware boundary
    # recovery (which produced visible mid-crossing turns) is OFF by default;
    # set true to re-enable it (uses recovery_angular_z below).
    dashed_recovery_enabled: false
    recovery_angular_z: 0.30    # only used if dashed_recovery_enabled: true

    # Single-frame error-jump clamp (bad_alginment fix): if the steering error
    # jumps more than this many px in ONE frame (a cx teleport onto a crossing
    # dash / outermost line near an intersection), reject it for one frame so the
    # PD doesn't slam the steering. A real sharp turn persists and is accepted on
    # the next frame. Set 0 to disable.
    max_error_jump_px: 60

    # Fork branch selection (pzb_not_workingcorrectly4). At a Y-fork the lane-center
    # (L+R)/2 averages the two diverging branches into a straight target and the
    # robot misses the turn; this steers toward the branch that continues the line it
    # is already on (base-proximity continuity). VERIFIED to steer the bag4 fork LEFT
    # offline. Default FALSE: per-frame geometry cannot yet separate a real fork from
    # a sharp single-lane curve (it regresses bad_ignment5 / bad_alginment2), so it is
    # gated until a temporal/exits-based discriminator is added. Set true to A/B test
    # the fork path on the bag4 route only.
    fork_select_enabled: false

    # Perpendicular dashed-alignment (bad_alginment2 fix): before crossing, rotate
    # the robot to be perpendicular to the dashes using the median dash-slope (the
    # detector fits it from dash candidates only, so it's a clean signal). This is
    # essential for future intersection actions beyond going straight.
    #   enabled        — master switch
    #   deadband_deg   — within this tilt the robot is "perpendicular enough" (no steer)
    #   k_align_z      — rad/s per degree of tilt (P gain; raise for faster squaring)
    #   align_max_z    — cap on alignment angular.z
    #   align_sign     — +1/-1 rotation direction; FLIP if it aligns the wrong way
    #   median_n       — number of valid slope samples to median-filter (noise reject)
    #   align_timeout_s— (legacy) max time spent aligning before crossing anyway
    # Strong safeguards (bad_ignment4 fix) — alignment was firing on an already-
    # straight robot from a degraded end-of-crossing slope reading (+32° when the
    # truth was +1–2°), rotating it off the straight lines it should have followed:
    #   align_window_s    — only correct in this early window after dashed entry;
    #                       after it, cross straight (the dash row degrades as the
    #                       robot overlaps it). An in-deadband reading latches
    #                       "aligned" immediately and never re-steers.
    #   align_max_tilt_deg— reject slope frames implying a larger tilt than this as
    #                       physically implausible garbage (don't feed the median).
    # DISABLED (10-attempt fix): the only required action at a dashed crossing right now
    # is to cross STRAIGHT (signs/YOLO will choose the direction later). With alignment
    # off the node latches "aligned" immediately on dashed entry and goes straight to the
    # straight-crossing phase (angular.z=0) — removing the unverified align_sign rotation
    # as a variable (attempts 5/6/7/9 went the wrong way at the junction).
    dashed_align_enabled: false
    align_deadband_deg:   6.0
    k_align_z:            0.015
    align_max_z:          0.30
    align_sign:           1
    align_slope_median_n: 5
    align_timeout_s:      1.2
    align_window_s:       2.0
    align_max_tilt_deg:   35.0

    # Seconds to delay full angular output after a sharp turn first appears in the image.
    # The camera looks ~15 cm ahead of the wheel axle; this gives the body time to arrive
    # at the turn before committing to max steering. Tune: 0.1–0.25 s on hardware.
    turn_approach_delay_s: 0.15

    # Post-intersection acquisition guard (bag8 Section-1 fix): for this many
    # seconds after a dashed→solid exit, the tracker anchors are re-seeded to
    # image center and angular output is capped (like turn_approach_delay) so the
    # robot can't pivot ~90° onto a leftover crossing dash before settling.
    acquire_guard_s: 0.4

    # Stuck-lock watchdog (bag8 Section-2 fix): if the tracked error stays frozen
    # far off-center for stuck_lock_s, the robot is "following" a stationary
    # non-line (wall / floor-panel seam) — declare the line lost so it coasts then
    # stops instead of rotating into the obstacle.
    #   band: |error| above this (px) counts as off-center
    #   var:  error spread (max-min, px) below this counts as frozen
    # Conservative defaults: a real curve's error changes as the robot rotates
    # and resolves within ~1 s, so a TRULY frozen error for 2.5 s with <4 px of
    # movement is a stationary lock (wall/seam), not a curve. Tighten from real
    # bag data: if a genuine curve ever trips it, raise stuck_lock_s; if a wall is
    # chased too long before stopping, lower it.
    stuck_lock_s:       2.5
    stuck_lock_band_px: 20
    stuck_lock_var_px:  4

    # Publish pipeline debug visualization on /line_follower/debug_image
    # Set to true only during tuning sessions — generates 7-tile image every frame
    publish_debug: true

    # Loss coasting: when all 3 line slots are lost, hold last command at reduced speed
    # for up to lost_timeout_s before stopping (Team2 pattern: lost_timeout_s=0.3)
    lost_timeout_s:   0.35
    lost_speed_scale: 0.50

    # Sharp-turn override: when |error| exceeds threshold, clamp speed to sharp_turn_speed.
    # Also used as the floor speed when fewer than 2 lines are visible (intersection handling).
    sharp_turn_threshold_px: 60
    sharp_turn_speed: 0.02

    # Input and output topic names
    # topic_cmd_vel feeds twist_slew_limiter; slew limiter outputs to /cmd_vel_desired
    topic_image_in: /camera/image_raw
    topic_cmd_vel:  /cmd_vel_desired_raw
