# ─── Visual Detector ─────────────────────────────────────────────────────────
visual_detector_node:
  ros__parameters:
    # 'color_blob' or 'aruco'
    # NOTE: ArUco is strongly recommended with the USB camera — auto-exposure
    # causes the V channel in HSV to drift, making color thresholds unreliable.
    detector_type: color_blob

    # ── USB camera (Microdia 0c45:6340, 640×480) ──────────────────────────
    image_width:  640
    image_height: 480
    # Calibrated principal point (auto_camera_calibration.yaml, RMS 0.626 px).
    # Do NOT leave these as -1 (which would use image_width/2 = 320, image_height/2 = 240
    # — wrong for this lens).
    cx: 300.88887537035174
    cy: 327.1605099394511

    # Apparent area (pixels²) of the target at the desired servoing distance.
    # Yellow cube 5.5×5.5 cm face at 0.5 m, USB camera fx≈1014.7:
    #   side_px = fx * side_m / Z = 1014.72 * 0.055 / 0.5 ≈ 111.6 px
    #   area    = 111.6² ≈ 12455 px²
    # Verify by placing the robot at 0.5 m and reading the area from the debug image.
    desired_area: 12455.0

    # ── Color blob (yellow cube) ───────────────────────────────────────────
    # HSV range tuned from reference image (indoor, USB camera).
    # OpenCV HSV: H∈[0,180], S/V∈[0,255].  Pure yellow = H≈30.
    # S≥160 separates the cube from skin tones (S≈100-180) and
    # desaturated surfaces. V≥100 retained for shadow edges; CLAHE
    # normalises the effective brightness before thresholding.
    hsv_lower: [20, 160, 100]
    hsv_upper: [38, 255, 255]
    ball_diameter_m: 0.055      # cube side length [m]
    min_contour_area: 500.0     # discard blobs smaller than this [px²]

    # Solidity = contour_area / convex_hull_area.  Values < 0.75 indicate
    # non-convex shapes (shadows, table edges) — reject them.
    min_solidity: 0.75

    # CLAHE on the HSV Value channel normalises for changing room lighting
    # without affecting hue or saturation.  clip_limit=2.0 is conservative.
    use_clahe: true
    clahe_clip_limit: 2.0

    # Temporal holdoff: keep last valid detection for this many consecutive
    # failed frames before reporting conf=0. Prevents single-frame dropouts
    # from triggering the lost_timeout countdown in the MPC.
    detection_holdoff_frames: 3

    # ── ArUco marker ───────────────────────────────────────────────────────
    marker_id: 0
    marker_size_m: 0.10
    aruco_dict: DICT_4X4_50

    confidence_threshold: 0.5


# ─── MPC IBVS Controller ─────────────────────────────────────────────────────
mpc_ibvs_node:
  ros__parameters:
    Ts: 0.08           # control period [s]  (12.5 Hz)
    N: 15              # prediction horizon [steps]  → 1.2 s lookahead

    # Feature error weights [eu, ev, ea], applied to the *normalized* errors
    # (eu/feat_norm_uv, ev/feat_norm_uv, ea/feat_norm_a) so they balance against
    # R_diag. ev is set to 0: once eu→0 the vertical-pixel error and the area
    # error are both driven essentially only by forward v (a 1-DOF redundancy),
    # so penalizing both makes the controller park at a non-zero compromise.
    # Distance is regulated via the area channel (ea) alone.
    Q_diag: [1.0, 0.0, 0.8]
    # Control effort weights [v, omega] — higher values = smaller, smoother commands
    R_diag: [0.40, 1.00]
    # Feature-error normalization (denominators for Q). See mpc_ibvs_node.py.
    feat_norm_uv: 600.0   # ≈ half image width, pixels
    feat_norm_a:   50.0   # ≈ sqrt(area) dynamic range, pixels

    # Velocity constraints
    v_max: 0.25        # max forward speed [m/s]
    v_min: -0.10       # allow backward motion to correct "too close"
    omega_max: 0.45    # max angular speed [rad/s]

    # Safety: stop if no detection received within this window
    lost_timeout_s: 1.5   # camera publishes at ~2 Hz; was 0.5 → too tight
    confidence_threshold: 0.3
    lost_decel_s: 0.4
    diag_period_s: 1.0
    online_linearization: true

    # ── Camera intrinsics — USB camera (Microdia 0c45:6340, 640×480) ──────
    # Source: cam_calibration/auto_camera_calibration.yaml, RMS 0.626 px.
    fx: 1014.7214071015309
    fy: 1017.2197182172375
    cx: 300.88887537035174
    cy: 327.1605099394511

    # Goal parking distance from target [m]
    nominal_depth_Z: 0.50

    # Must match visual_detector_node/desired_area
    desired_area: 12455.0

    # ── Velocity dynamics — re-identify if inner-loop gains change ─────────
    # Step-response test:
    #   ros2 topic pub /cmd_vel_desired geometry_msgs/msg/Twist \
    #     "{linear: {x: 0.15}}" --rate 20
    #   rqt_plot /robot_vel/twist/linear/x
    # tau = time for the response to reach 63% of the commanded value.
    tau_v:     0.40   # effective time constant [s]
    tau_omega: 0.40   # angular time constant [s]

    # ── Dead zone ──────────────────────────────────────────────────────────────
    # Robot stops commanding motion when ALL three errors are within these bounds.
    # Exit requires any error to exceed  threshold × dead_zone_exit_factor.
    # Hysteresis prevents stutter at the boundary.
    dead_zone_eu: 20.0       # pixels  — horizontal error dead zone (~3% of 640px width)
    dead_zone_ev: 100000.0   # effectively disabled: ev is not a controlled channel
                             # (Q_diag[1]=0), so it must not gate the dead zone
    dead_zone_ea: 30.0       # pixels  — area/depth error dead zone (sqrt-area units)
    dead_zone_exit_factor: 3.0    # exit only when error > 3× entry threshold (wider hysteresis)
    dead_zone_persist_frames: 3   # consecutive frames required to enter or exit dead zone
