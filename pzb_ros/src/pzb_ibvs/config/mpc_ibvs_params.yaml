# ─── Visual Detector ─────────────────────────────────────────────────────────
visual_detector_node:
  ros__parameters:
    # 'color_blob' or 'aruco'
    detector_type: color_blob

    image_width: 1280
    image_height: 720
    # cx/cy: image principal point (negative → use image_width/2, image_height/2)
    cx: -1.0
    cy: -1.0

    # Apparent area (pixels²) of the target when at the desired servoing distance.
    # Yellow cube 5.5×5.5 cm face at 0.5 m → side ≈ 107 px → area ≈ 11444 px²
    # Tune by placing the robot at goal distance and reading area from debug image.
    desired_area: 11444.0

    # ── Color blob (yellow cube) ───────────────────────────────────────────
    # HSV range for the yellow cube. OpenCV HSV: H∈[0,180], S/V∈[0,255].
    # Yellow hue is ~20–35. Adjust under your lighting if needed.
    hsv_lower: [20, 100, 100]
    hsv_upper: [35, 255, 255]
    ball_diameter_m: 0.055      # cube side length [m] — used for depth estimation
    min_contour_area: 500.0     # discard detections smaller than this (px²)

    # ── ArUco marker ───────────────────────────────────────────────────────
    marker_id: 0                # integer ID to track
    marker_size_m: 0.10         # physical side length in metres
    aruco_dict: DICT_4X4_50

    confidence_threshold: 0.5


# ─── MPC IBVS Controller ─────────────────────────────────────────────────────
mpc_ibvs_node:
  ros__parameters:
    Ts: 0.08           # control period [s]  (12.5 Hz)
    N: 15              # prediction horizon [steps]  → 1.2 s lookahead

    # Feature error weights [eu, ev, ea] — increase to servo more aggressively
    Q_diag: [1.0, 1.0, 0.5]
    # Control effort weights [v, omega] — increase to slow down commands
    R_diag: [0.1, 0.2]

    # Velocity constraints
    v_max: 0.30        # max forward speed [m/s]  (hardware limit is 0.60)
    v_min: -0.05       # allow slight backward motion to correct overshoot
    omega_max: 1.20    # max angular speed [rad/s]

    # Safety: stop if no detection received within this window
    lost_timeout_s: 0.5
    # Ignore detections below this confidence.
    confidence_threshold: 0.5
    # Rebuild local linear model from current (eu, ev) each cycle.
    online_linearization: true

    # ── Camera intrinsics (calibrated: RMS 0.577478 px, camera_info_8x5_3cm.yaml)
    fx: 972.5872931058249
    fy: 976.8162716689993
    cx: 635.4928589069335
    cy: 367.1861023804187

    # Estimated depth Z [m] at the desired goal pose (robot distance from target).
    # This is used to build the linearised interaction matrix. Tune to match your
    # physical setup.
    nominal_depth_Z: 0.50

    # Must match visual_detector_node/desired_area
    desired_area: 11444.0

    # ── Velocity dynamics augmentation ────────────────────────────────────────
    # First-order closed-loop time constants for the velocity step response.
    # They model the combined lag of the Jetson velocity_controller PI + MCU wheel PID.
    # Identify via step response:
    #   ros2 topic pub /cmd_vel_desired geometry_msgs/msg/Twist \
    #     "{linear: {x: 0.15}}" --rate 20
    #   rqt_plot /robot_vel/twist/linear/x
    # tau = time for the response to reach 63% of the commanded value.
    tau_v:     0.15   # linear velocity time constant [s]
    tau_omega: 0.10   # angular velocity time constant [s] (typically faster)
