camera_publisher:
  ros__parameters:
    # CSI camera sensor index (0 for single camera)
    sensor_id: 0

    # Capture resolution (must match a mode supported by IMX219)
    # Supported: 3264x2464@21, 3264x1848@28, 1920x1080@30, 1640x1232@30, 1280x720@60
    width: 1280
    height: 720
    framerate: 30

    # JPEG quality for CompressedImage (1-100). 80 is a good balance.
    jpeg_quality: 80

    # Topic names
    topic_compressed: /camera/image_compressed
    topic_raw: /camera/image_raw

    # Camera frame id for the header
    frame_id: camera_optical_frame
