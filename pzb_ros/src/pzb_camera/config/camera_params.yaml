camera_publisher:
  ros__parameters:
    # CSI camera sensor index (0 for single camera)
    sensor_id: 0

    # Capture resolution (must match a mode supported by IMX219)
    # Supported: 3264x2464@21, 3264x1848@28, 1920x1080@30, 1640x1232@30, 1280x720@60
    width: 1280
    height: 720

    # Publish framerate for ROS2 topics (ROS2 timer rate).
    # The GStreamer pipeline uses the native sensor framerate automatically
    # (60fps for 1280x720 — the IMX219 has no 30fps mode at that resolution).
    # Keep this <= native sensor rate.
    framerate: 30

    # JPEG quality for CompressedImage (1-100). 80 is a good balance.
    jpeg_quality: 75

    # nvvidconv flip-method for CSI cameras:
    # 0:none, 2:rotate-180, 4:horizontal, 6:vertical
    flip_method: 0

    # Publish /camera/image_compressed stream.
    publish_compressed: true

    # Publish heavy /camera/image_raw stream. Keep false for teleop/RViz over network.
    publish_raw: false

    # Topic names
    topic_compressed: /camera/image_compressed
    topic_raw: /camera/image_raw

    # Camera frame id for the header
    frame_id: camera_optical_frame

    # Color calibration: path to .npz with per-pixel gain array 'arr_0'.
    # Leave empty ('') to disable color correction.
    color_cal_file: '/home/puzzlebot/color_cal/colorCalibration.npz'

    # Publish /camera/camera_info from the calibration YAML below.
    publish_camera_info: true

    # Path to the camera intrinsics YAML (ROS camera_info format).
    # Leave empty to disable; the launch file sets this to the installed share path.
    camera_info_file: ''

    # Topic name for CameraInfo
    topic_camera_info: /camera/camera_info
